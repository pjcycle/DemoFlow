name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DemoFlow
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Packages
        run: xcodebuild -resolvePackageDependencies -project DemoFlow.xcodeproj

      - name: Build AppStore
        env:
          CONFIGURATION_BUILD_DIR: ${{ github.workspace }}/Build/AppStore
        run: |
          xcodebuild build \
            -project DemoFlow.xcodeproj \
            -scheme DemoFlow \
            -configuration AppStore \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release
        env:
          CONFIGURATION_BUILD_DIR: ${{ github.workspace }}/Build/Release
        run: |
          xcodebuild build \
            -project DemoFlow.xcodeproj \
            -scheme DemoFlow \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip AppStore App
        run: |
          cd Build/AppStore
          zip -r -q ../DemoFlow-AppStore.zip DemoFlow.app

      - name: Zip Release App
        run: |
          cd Build/Release
          zip -r -q ../DemoFlow-Release.zip DemoFlow.app

      - name: Upload AppStore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoFlow-AppStore
          path: Build/DemoFlow-AppStore.zip

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoFlow-Release
          path: Build/DemoFlow-Release.zip
