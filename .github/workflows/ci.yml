name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build PJFlow
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Packages
        run: xcodebuild -resolvePackageDependencies -project PJFlow.xcodeproj

      - name: Build AppStore
        run: |
          xcodebuild build \
            -project DemoFlow.xcodeproj \
            -scheme DemoFlow \
            -configuration AppStore \
            -destination 'platform=macOS' \
            -derivedDataPath ${{ github.workspace }}/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release
        run: |
          xcodebuild build \
            -project DemoFlow.xcodeproj \
            -scheme DemoFlow \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath ${{ github.workspace }}/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload AppStore App
        uses: actions/upload-artifact@v4
        with:
          name: PJFlow-AppStore
          path: DerivedData/Build/Products/AppStore/PJFlow.app

      - name: Upload Release App
        uses: actions/upload-artifact@v4
        with:
          name: PJFlow-Release
          path: DerivedData/Build/Products/Release/PJFlow.app
