name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DemoFlow
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Packages
        run: xcodebuild -resolvePackageDependencies -project DemoFlow.xcodeproj

      - name: Build AppStore
        run: |
          xcodebuild build \
            -project DemoFlow.xcodeproj \
            -scheme DemoFlow \
            -configuration AppStore \
            -destination 'platform=macOS' \
            -derivedDataPath Build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release
        run: |
          xcodebuild build \
            -project DemoFlow.xcodeproj \
            -scheme DemoFlow \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath Build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip AppStore App
        run: |
          cd Build/Build/Products/AppStore
          ditto -c -k --sequesterRsrc DemoFlow.app DemoFlow-AppStore.zip

      - name: Zip Release App
        run: |
          cd Build/Build/Products/Release
          ditto -c -k --sequesterRsrc DemoFlow.app DemoFlow-Release.zip

      - name: Upload AppStore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoFlow-AppStore
          path: Build/Build/Products/AppStore/DemoFlow-AppStore.zip

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoFlow-Release
          path: Build/Build/Products/Release/DemoFlow-Release.zip
